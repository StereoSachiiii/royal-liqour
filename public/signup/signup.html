<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Liquor E-Commerce</title>
</head>
<body>
    <h1>Create Account</h1>
    
    <div id="message"></div>
    
    <form id="signupForm" method="POST" action="signup.php">
        <fieldset>
            <legend>Account Information</legend>
            
            <label for="name">Full Name *</label>
            <input type="text" 
                   id="name" 
                   name="name" 
                   required 
                   minlength="2" 
                   maxlength="100"
                   autocomplete="name">
            <span id="name-error" class="error"></span>
            <br><br>
            
            <label for="email">Email Address *</label>
            <input type="email" 
                   id="email" 
                   name="email" 
                   required 
                   maxlength="254"
                   autocomplete="email">
            <span id="email-error" class="error"></span>
            <br><br>
            
            <label for="phone">Phone Number (Optional)</label>
            <input type="tel" 
                   id="phone" 
                   name="phone" 
                   placeholder="+94771234567 or 0771234567"
                   maxlength="15"
                   autocomplete="tel">
            <span id="phone-error" class="error"></span>
            <br><br>
            
            <label for="password">Password *</label>
            <input type="password" 
                   id="password" 
                   name="password" 
                   required 
                   minlength="8"
                   maxlength="72"
                   autocomplete="new-password">
            <small>At least 8 characters with uppercase, lowercase, number, and special character</small>
            <span id="password-error" class="error"></span>
            <br><br>
            
            <label for="confirm_password">Confirm Password *</label>
            <input type="password" 
                   id="confirm_password" 
                   name="confirm_password" 
                   required 
                   minlength="8"
                   maxlength="72"
                   autocomplete="new-password">
            <span id="confirm_password-error" class="error"></span>
            <br><br>
        </fieldset>
        
        <fieldset>
            <legend>Admin Registration (Optional)</legend>
            
            <label for="admin_key">Admin Secret Key</label>
            <input type="password" 
                   id="admin_key" 
                   name="admin_key" 
                   maxlength="255"
                   autocomplete="off"
                   placeholder="Enter 'admin123' for admin account">
            <small>Use <strong>admin123</strong> to create an admin account</small>
            <span id="admin_key-error" class="error"></span>
            <br><br>
        </fieldset>
        

        <input type="hidden" name="csrf_token" id="csrf_token" value="<?php echo $csrf->generateToken(); ?>">
        
        <button type="submit" id="submitBtn">Create Account</button>
        <button type="reset">Clear Form</button>
    </form>
    
    <p>Already have an account? <a href="login.html">Login here</a></p>
    
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.textContent = '');
            document.getElementById('message').textContent = '';
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            
            const formData = new FormData(this);
            
            // Client-side validation
            const password = formData.get('password');
            const confirmPassword = formData.get('confirm_password');
            
            if (password !== confirmPassword) {
                document.getElementById('confirm_password-error').textContent = 'Passwords do not match';
                document.getElementById('confirm_password-error').style.color = 'red';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
                return;
            }
            
            // Submit via AJAX
            fetch('signup.php', {
                method: 'POST',
                body: formData,
                credentials: 'same-origin'
            })
            .then(response => response.json())
            .then(data => {
                const messageDiv = document.getElementById('message');
                
                if (data.success) {
                    messageDiv.innerHTML = '<strong style="color: green;">' + data.message + '</strong>';
                    this.reset();
                    
                    // Redirect based on user type
                    setTimeout(function() {
                        window.location.href = data.redirect || 'dashboard.php';
                    }, 1500);
                } else {
                    messageDiv.innerHTML = '<strong style="color: red;">' + data.message + '</strong>';
                    
                    // Display field-specific errors
                    if (data.errors) {
                        Object.keys(data.errors).forEach(field => {
                            const errorEl = document.getElementById(field + '-error');
                            if (errorEl) {
                                errorEl.textContent = data.errors[field];
                                errorEl.style.color = 'red';
                            }
                        });
                    }
                    
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('message').innerHTML = 
                    '<strong style="color: red;">An error occurred. Please try again.</strong>';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            });
        });
        
        // Real-time password strength indicator
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const errorEl = document.getElementById('password-error');
            
            if (password.length === 0) {
                errorEl.textContent = '';
                return;
            }
            
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[^A-Za-z0-9]/.test(password);
            const isLongEnough = password.length >= 8;
            
            let missing = [];
            if (!hasUppercase) missing.push('uppercase');
            if (!hasLowercase) missing.push('lowercase');
            if (!hasNumber) missing.push('number');
            if (!hasSpecial) missing.push('special character');
            if (!isLongEnough) missing.push('8 characters minimum');
            
            if (missing.length > 0) {
                errorEl.textContent = 'Missing: ' + missing.join(', ');
                errorEl.style.color = 'orange';
            } else {
                errorEl.textContent = 'Strong password!';
                errorEl.style.color = 'green';
            }
        });
    </script>
</body>
</html>
